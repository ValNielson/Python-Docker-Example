# fly.toml app configuration file generated for python-docker-example on 2026-03-12T02:04:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'python-docker-example'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"
  protocol = "http"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "pgdata"
  destination = "/var/lib/postgresql/data"

[deploy]
  strategy = "rolling"
