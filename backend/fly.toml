# Fly.io configuration for the guestbook backend (Flask + Postgres)
# Deploy with: fly launch / fly deploy from the backend/ directory
#
# Before deploying, set secrets:
#   fly secrets set DATABASE_URL="postgres://..."
# (Use `fly postgres attach` to auto-set this if using Fly Postgres)

app = "guestbook-backend"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-sensitive env vars only — use `fly secrets set` for DATABASE_URL
  FLASK_ENV = "production"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/entries"
  protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[deploy]
  strategy = "rolling"
  release_command = "python -c \"from app import init_db; init_db()\""
