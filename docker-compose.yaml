services:
  frontend:
    build: ./frontend
    ports:
      - "6969:80"
    networks:
      - frontend-backend
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    networks:
      - frontend-backend
      - backend-db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guestbook"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  frontend-backend:
  backend-db:

volumes:
  pgdata:
